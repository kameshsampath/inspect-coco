name: Deploy docs
on:
    push:
        branches: [main]
        paths: ["docs/**", "mkdocs.yml", "src/**"]
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: astral-sh/setup-uv@v4
              with:
                  version: "latest"

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - run: uv sync --group docs

            - run: uv run mkdocs gh-deploy --force
